name: Native Android Build

on:
  workflow_dispatch:
    inputs:
      abi:
        description: Android ABI to build
        required: true
        default: arm64-v8a
        type: choice
        options:
          - arm64-v8a

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.abi }}
  cancel-in-progress: true

jobs:
  build-native-android:
    name: Build LiteRT-LM Vulkan/NPU bundle (${{ inputs.abi }})
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs

      - name: Install Android NDK
        run: |
          sdkmanager "platform-tools" "platforms;android-36" "ndk;28.2.13676358"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> "$GITHUB_ENV"

      - name: Build native Vulkan/NPU bundle
        env:
          ABI: ${{ inputs.abi }}
          NDK_VERSION: 28.2.13676358
          ACCELERATORS: vulkan,npu
        run: tool/build_litert_lm_android.sh

      - name: Upload native bundle
        uses: actions/upload-artifact@v4
        with:
          name: liblitert-lm-android-${{ inputs.abi }}
          path: android/src/main/jniLibs/${{ inputs.abi }}/*.so
          if-no-files-found: error
