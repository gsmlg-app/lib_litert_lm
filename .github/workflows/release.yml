name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: Release version (e.g. 1.2.3)
        required: true
        type: string
      git_ref:
        description: Git ref to release from
        required: true
        default: main
        type: string
      publish_to_pub:
        description: Publish to pub.dev. Requires a pushed version tag for OIDC.
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build, tag, and release
    runs-on: ubuntu-latest
    timeout-minutes: 390

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref || github.ref }}
          fetch-depth: 0

      - name: Setup Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve release settings
        id: release
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_GIT_REF: ${{ inputs.git_ref }}
          INPUT_PUBLISH_TO_PUB: ${{ inputs.publish_to_pub }}
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            GIT_REF="${GITHUB_REF_NAME}"
            PUBLISH_TO_PUB="true"
            UPDATE_VERSIONS="false"
            TAGGED="true"
          else
            VERSION="${INPUT_VERSION}"
            GIT_REF="${INPUT_GIT_REF:-main}"
            PUBLISH_TO_PUB="${INPUT_PUBLISH_TO_PUB:-false}"
            UPDATE_VERSIONS="true"
            TAGGED="false"
          fi

          if [[ -z "${VERSION}" ]]; then
            echo "::error::Release version is required."
            exit 1
          fi

          if [[ "${PUBLISH_TO_PUB}" == "true" && "${TAGGED}" != "true" ]]; then
            echo "::error::pub.dev OIDC publishing requires a pushed version tag such as v${VERSION}."
            exit 1
          fi

          {
            echo "version=${VERSION}"
            echo "git_ref=${GIT_REF}"
            echo "publish_to_pub=${PUBLISH_TO_PUB}"
            echo "update_versions=${UPDATE_VERSIONS}"
            echo "tagged=${TAGGED}"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Dart for pub.dev OIDC
        uses: dart-lang/setup-dart@v1

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-36" "ndk;28.2.13676358"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> "$GITHUB_ENV"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
            example/.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Update package versions
        if: ${{ steps.release.outputs.update_versions == 'true' }}
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          perl -0pi -e 's/^version: .+$/version: $ENV{VERSION}/m' pubspec.yaml
          if [[ "$VERSION" == *+* ]]; then
            EXAMPLE_VERSION="$VERSION"
          else
            EXAMPLE_VERSION="${VERSION}+1"
          fi
          export EXAMPLE_VERSION
          perl -0pi -e 's/^version: .+$/version: $ENV{EXAMPLE_VERSION}/m' example/pubspec.yaml

      - name: Validate tagged package version
        if: ${{ steps.release.outputs.tagged == 'true' }}
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          if ! grep -qx "version: ${VERSION}" pubspec.yaml; then
            echo "::error::pubspec.yaml version must match pushed tag v${VERSION}."
            exit 1
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test example/lib example/test

      - name: Analyze
        run: flutter analyze

      - name: Run package tests
        run: flutter test

      - name: Run example tests
        working-directory: example
        run: flutter test

      - name: Run example e2e smoke
        working-directory: example
        run: flutter test integration_test/app_e2e_test.dart -d flutter-tester

      - name: Build native Android Vulkan/NPU bundle
        env:
          ABI: arm64-v8a
          NDK_VERSION: 28.2.13676358
          ACCELERATORS: vulkan,npu
        run: tool/build_litert_lm_android.sh

      - name: Check Android build configuration
        working-directory: example
        run: flutter build apk --debug --config-only

      - name: Validate pub package
        run: dart pub publish --dry-run --ignore-warnings

      - name: Create release artifacts
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          mkdir -p dist/release
          tar -czf "dist/release/lib_litert_lm-source-${VERSION}.tar.gz" \
            --exclude='.git' \
            --exclude='.dart_tool' \
            --exclude='.github' \
            --exclude='build' \
            --exclude='dist' \
            --exclude='example/.dart_tool' \
            --exclude='example/build' \
            .
          tar -czf "dist/release/liblitert_lm-android-arm64-v8a-${VERSION}.tar.gz" \
            -C android/src/main/jniLibs arm64-v8a
          (
            cd dist/release
            sha256sum * > SHA256SUMS
          )

      - name: Commit release version and native library
        if: ${{ steps.release.outputs.update_versions == 'true' }}
        env:
          VERSION: ${{ steps.release.outputs.version }}
          GIT_REF: ${{ steps.release.outputs.git_ref }}
        run: |
          git add pubspec.yaml example/pubspec.yaml android/src/main/jniLibs/arm64-v8a/*.so
          if git diff --cached --quiet; then
            echo "Release files are already current for v${VERSION}."
          else
            git commit -m "chore(release): v${VERSION}"
          fi
          git push origin "HEAD:${GIT_REF}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release.outputs.version }}
          TAGGED: ${{ steps.release.outputs.tagged }}
        run: |
          if [[ "${TAGGED}" == "true" ]]; then
            gh release create "v${VERSION}" dist/release/* \
              --generate-notes \
              --title "v${VERSION}"
          else
            gh release create "v${VERSION}" dist/release/* \
              --target "$(git rev-parse HEAD)" \
              --generate-notes \
              --title "v${VERSION}"
          fi

      - name: Publish to pub.dev
        if: ${{ steps.release.outputs.publish_to_pub == 'true' }}
        run: dart pub publish --force
