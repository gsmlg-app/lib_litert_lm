name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (e.g. 1.2.3)
        required: true
        type: string
      git_ref:
        description: Git ref to release from
        required: true
        default: main
        type: string
      publish_to_pub:
        description: Publish to pub.dev after creating the GitHub release
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build, tag, and release
    runs-on: ubuntu-latest
    timeout-minutes: 390

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0

      - name: Setup Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-36" "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
            example/.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Update package versions
        env:
          VERSION: ${{ inputs.version }}
        run: |
          perl -0pi -e 's/^version: .+$/version: $ENV{VERSION}/m' pubspec.yaml
          if [[ "$VERSION" == *+* ]]; then
            EXAMPLE_VERSION="$VERSION"
          else
            EXAMPLE_VERSION="${VERSION}+1"
          fi
          export EXAMPLE_VERSION
          perl -0pi -e 's/^version: .+$/version: $ENV{EXAMPLE_VERSION}/m' example/pubspec.yaml

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test example/lib example/test

      - name: Analyze
        run: flutter analyze

      - name: Run package tests
        run: flutter test

      - name: Run example tests
        working-directory: example
        run: flutter test

      - name: Build native Android library
        env:
          ABI: arm64-v8a
          NDK_VERSION: 27.0.12077973
        run: tool/build_litert_lm_android.sh

      - name: Check Android build configuration
        working-directory: example
        run: flutter build apk --debug --config-only

      - name: Validate pub package
        run: flutter pub publish --dry-run --ignore-warnings

      - name: Create release artifacts
        env:
          VERSION: ${{ inputs.version }}
        run: |
          mkdir -p dist/release
          tar -czf "dist/release/lib_litert_lm-source-${VERSION}.tar.gz" \
            --exclude='.git' \
            --exclude='.dart_tool' \
            --exclude='.github' \
            --exclude='build' \
            --exclude='dist' \
            --exclude='example/.dart_tool' \
            --exclude='example/build' \
            .
          cp android/src/main/jniLibs/arm64-v8a/liblitert_lm_c.so \
            "dist/release/liblitert_lm_c-android-arm64-v8a-${VERSION}.so"
          (
            cd dist/release
            sha256sum * > SHA256SUMS
          )

      - name: Commit release version and native library
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git add pubspec.yaml example/pubspec.yaml android/src/main/jniLibs/arm64-v8a/liblitert_lm_c.so
          if git diff --cached --quiet; then
            echo "Release files are already current for v${VERSION}."
          else
            git commit -m "chore(release): v${VERSION}"
          fi
          git push origin "HEAD:${{ inputs.git_ref }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release create "v${VERSION}" dist/release/* \
            --target "$(git rev-parse HEAD)" \
            --generate-notes \
            --title "v${VERSION}"

      - name: Configure pub.dev credentials
        if: ${{ inputs.publish_to_pub }}
        env:
          PUB_CREDENTIALS: ${{ secrets.PUB_CREDENTIALS }}
        run: |
          if [[ -z "$PUB_CREDENTIALS" ]]; then
            echo "::error::Set the PUB_CREDENTIALS secret before publishing to pub.dev."
            exit 1
          fi
          mkdir -p "$HOME/.config/dart"
          printf '%s' "$PUB_CREDENTIALS" > "$HOME/.config/dart/pub-credentials.json"

      - name: Publish to pub.dev
        if: ${{ inputs.publish_to_pub }}
        run: flutter pub publish --force
