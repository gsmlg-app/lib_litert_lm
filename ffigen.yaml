name: LiteRtLmBindings
description: Generated Dart FFI bindings for the LiteRT-LM C API.
output: lib/src/bindings/litert_lm_bindings_generated.dart
headers:
  entry-points:
    - third_party/litert_lm/c/engine.h
compiler-opts:
  - -Ithird_party/litert_lm/c
functions:
  include:
    - litert_lm_.*
structs:
  include:
    - LiteRtLmInputData
    - LiteRtLmSamplerParams
enums:
  include:
    - LiteRtLmInputDataType
    - LiteRtLmSamplerType
    - LiteRtLmTokenUnionType
typedefs:
  include:
    - LiteRtLm.*
preamble: |
  // ignore_for_file: always_specify_types
  // ignore_for_file: camel_case_types
  // ignore_for_file: non_constant_identifier_names
  // ignore_for_file: unused_element
  // ignore_for_file: unused_field
comments:
  style: any
  length: brief
silence-enum-warning: true
